<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
    <link rel="shortcut icon" href="./image/gold-coin.256x256.png" type="image/x-icon">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="form">
              <span class="heading">Conversor de Moedas</span>
              <h3 class="c2">DE:</h3>
              <select class="c1" id="moedaOrigem">
                <option value="USD">Dólar (USD)</option>
                <option value="EUR">Euro (EUR)</option>
                <option value="JPY">Iene Japonês (JPY)</option>
                <option value="BRL">Real (BRL)</option>
            </select>
            <h3 class="c2">PARA:</h3>
            <select class="c1" id="moedaDestino">
                <option value="USD">Dólar (USD)</option>
                <option value="EUR">Euro (EUR)</option>
                <option value="JPY">Iene Japonês (JPY)</option>
                <option value="BRL">Real (BRL)</option>
            </select>
            <form class="form" onsubmit="converter(event)">
          
              <input class="input" type="number" id="valor" placeholder="Digite o valor" />
              <div class="button-container">
                <button type="submit" class="send-button">CAMBIO</button>
              </div>
            </form>
            <br>
              <span class="c2" id="resultado" >.........................................</span>
            </div>
          </div>
          
    </div>

    <script src="script.js"></script>
</body>
</html>
